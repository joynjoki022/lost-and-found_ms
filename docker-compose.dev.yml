services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    container_name: lost_and_found
    working_dir: /usr/src/app
    volumes:
      - ./:/usr/src/app
      - ./node_modules:/usr/src/app/node_modules
    networks:
      - proxy
    stdin_open: true
    tty: true
    command: sh -c "npm install && npm run dev"
    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lost_and_found.rule=Host(`lostandfound.internal`)"
      - "traefik.http.routers.lost_and_found.entrypoints=websecure"
      - "traefik.http.routers.lost_and_found.tls=true"
      - "traefik.http.services.lost_and_found.loadbalancer.server.port=3000"
networks:
  proxy:
    external: true
