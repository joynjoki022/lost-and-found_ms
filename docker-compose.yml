version: "3.9"

services:
  lost_and_found:
    container_name: lost_and_found
    build: .
    restart: unless-stopped

    networks:
      - proxy

    labels:
      - "traefik.enable=true"
      - "traefik.http.routers.lost_and_found.rule=Host(`lostandfound.pasbestventures.com`)"
      - "traefik.http.routers.lost_and_found.entrypoints=websecure"
      - "traefik.http.routers.lost_and_found.tls.certresolver=letsencrypt"
      - "traefik.http.services.lost_and_found.loadbalancer.server.port=3000"

networks:
  proxy:
    external: true
